<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Monopoly Deal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎩</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="screen-home" class="screen">
    <div class="home-card">
      <h1 class="logo">MONOPOLY<span>DEAL</span></h1>
      <p class="tagline">🎩 Steal sets. Charge rent. Say no.</p>
      <input id="name-input" maxlength="16" placeholder="Your name" autocomplete="off">
      <button id="create-btn" class="btn btn-red">Create a room</button>
      <div class="join-row">
        <input id="code-input" maxlength="4" placeholder="CODE" autocomplete="off">
        <button id="join-btn" class="btn btn-green">Join</button>
      </div>
    </div>
  </div>

  <div id="screen-lobby" class="screen hidden">
    <div class="home-card">
      <p class="tagline">Room code</p>
      <div class="room-code" id="lobby-code"></div>
      <p class="tagline">Share this code with your opponent</p>
      <ul id="lobby-players"></ul>
      <button id="start-btn" class="btn btn-red hidden">Start game</button>
      <p id="lobby-wait" class="tagline"></p>
    </div>
  </div>

  <div id="screen-game" class="screen hidden">
    <div id="opponents"></div>
    <div id="center">
      <div id="deck-area">
        <div id="deck" class="card card-back"><span id="deck-count"></span></div>
        <div id="discard-slot"></div>
      </div>
      <div id="turn-status"></div>
      <div id="log"></div>
    </div>
    <div id="me">
      <div id="my-table"></div>
      <div id="my-hud">
        <div id="my-avatar"></div>
        <div id="plays-pips"></div>
        <button id="end-turn-btn" class="btn btn-red hidden">End turn</button>
      </div>
      <div id="my-hand"></div>
    </div>
    <div id="banner" class="hidden"></div>
    <div id="toast" class="hidden"></div>
    <div id="chat-ctl">
      <button id="chat-btn" aria-label="Chat">💬<span id="chat-badge" class="hidden"></span></button>
      <span id="ping-dot" title="Connection"></span>
    </div>
    <div id="chat-panel" class="hidden">
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input id="chat-input" maxlength="140" placeholder="Say something…" autocomplete="off">
        <button class="btn btn-red" type="submit">Send</button>
      </form>
    </div>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/motion@12/dist/motion.js"></script>
  <script src="client.js"></script>
</body>
</html>
